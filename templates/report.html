<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); margin: 0; padding: 40px; min-height: 100vh; }
.container { max-width: 1000px; margin: 0 auto; }
.card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
h1 { color: black; font-size: 32px; font-weight: 700; margin-bottom: 24px; text-align: center; }
.btn { padding: 16px 32px; background: linear-gradient(to right, #10B981, #059669); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 14px rgba(16,185,129,0.4); transition: all 0.2s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(16,185,129,0.5); }
.chart-container { position: relative; height: 400px; margin: 40px 0; }
canvas { max-height: 400px !important; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Mntambo Reports</h1>
    <div class="chart-container">
      <canvas id="hoursChart"></canvas>
    </div>
    <button onclick="window.location='/export'" class="btn">📥 Download CSV Report</button>
  </div>
</div>

<script>
fetch('/report')
.then(res => res.json())
.then(data => {
  const ctx = document.getElementById('hoursChart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(r => r[0]),
      datasets: [{
        label: 'Total Hours',
        data: data.map(r => r[2]),
        backgroundColor: 'rgba(16, 185, 129, 0.8)',
        borderColor: '#10B981',
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { font: { size: 16 } }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(0,0,0,0.05)' }
        }
      }
    }
  });
});
</script>
</body>
</html>
