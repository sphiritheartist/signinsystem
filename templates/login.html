 <div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 400px; margin: 0 auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
  <h1 style="text-align: center; color: black; font-size: 28px; font-weight: 600; margin-bottom: 32px;">Mntambo Safety Services</h1>
  <p style="text-align: center; color: #6B7280; margin-bottom: 32px;">Sign In to Attendance System</p>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 12px 16px; border: 1px solid #D1D5DB; border-radius: 12px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box;">
    <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 12px 16px; border: 1px solid #D1D5DB; border-radius: 12px; font-size: 16px; margin-bottom: 24px; box-sizing: border-box;">
    <button type="submit" style="width: 100%; padding: 12px; background: linear-gradient(to right, #10B981, #059669); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0, 0,0,0.1);">Sign In</button>
  </form>
</div>
<script>
document.getElementById("loginForm").onsubmit = async (e) => {
  e.preventDefault();
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.message) {
    window.location = '/dashboard';
  } else {
    alert(data.error || 'Login failed');
  }
};
</script>
